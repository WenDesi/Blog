# Site Settings
title: Desi Blog
description: A personal blog about technology, ideas, and life.
author: Desi
email: your-email@example.com
url: "" # Set to your site URL when deploying, e.g. https://wendesi.github.io
baseurl: "/Blog" # The subpath of your site, e.g. /Blog for GitHub Pages project sites

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Server Settings
port: 4001

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Social Links (uncomment and fill in as needed)
# github_username: WenDesi
# twitter_username: your_twitter
# linkedin_username: your_linkedin

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
